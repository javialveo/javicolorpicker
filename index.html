<!DOCTYPE html>
<!-- Por Eduardo Alveo -->
<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/estilos.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaviColorPicker</title>
  </head>
  <body>
    <header id="cabeceraWeb" class="aplicarFlex">
      <h1>JaviColorPicker</h1>
      <p>versión: <span id="versionApp"></span></p>
    </header>
    <main id="contenidoWeb">
      <div id="ctApp">
        <div id="subContenedor" class="aplicarFlex">
          <div id="salidaColor"></div>
          <div id="infoColor">
            <form>
              <fieldset>
                <legend>Seleccione Color</legend>
                <input id="selectorColor" type="color">
              </fieldset>
            </form>
            <h4 class="aplicarNegrita">Código Del Color</h4>
            <p id="codigoColor">
              <span class="aplicarNegrita">Hexadecimal:</span> <span id="enHexadecimal"></span>
              <br>
              <!--RGB: rgb(<span id="enRGB"></span>)-->
            </p>
          </div>
        </div>
      </div>
    </main>
    <footer id="pieWeb">
      <div>
        <p>&copy;2020 - 2021 Eduardo Alveo. Derechos Reservados</p>
      </div>
    </footer>
    
    <script src="js/programa.js"></script>
  </body>
</html>
