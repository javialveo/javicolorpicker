<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/estilos.css">
    <meta name="description" content="JaviColorPicker, un sencillo selector de color para la web">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaviColorPicker</title>
  </head>
  <body>
    <header class="cabecera">
      <h1 class="cabeceraTitulo">JaviColorPicker</h1>
      <p class="cabeceraEtiqueta">versión: <span id="cabeceraVersion"></span></p>
    </header>
    
    <div id="salidaColor" class="campoColor"></div>
    
    <div class="selectorHtml">
      <form class="formulario">
        <fieldset class="formularioMarco">
          <legend class="formularioTitulo">Selector HTML</legend>
          <input id="htmlColor" type="color">
        </fieldset>
      </form>
    </div>
    
    <div class="selectorRGB">
      <form class="formulario">
        <fieldset class="formularioMarco">
          <legend class="formularioTitulo">Selector RGB</legend>
          <label class="formularioEtiqueta" for="colorRojo">Rojo: <span id="totalRojo" class="formularioEtiqueta-totalColor"></span></label>
          <input id="colorRojo" class="formularioRango" type="range"><br>
          
          <label class="formularioEtiqueta" for="colorVerde">Verde: <span id="totalVerde" class="formularioEtiqueta-totalColor"></span></label>
          <input id="colorVerde" class="formularioRango" type="range"><br>
          
          <label class="formularioEtiqueta" for="colorAzul">Azul: <span id="totalAzul" class="formularioEtiqueta-totalColor"></span></label>
          <input id="colorAzul" class="formularioRango" type="range"><br>
        </fieldset>
      </form>
    </div>
    
    <div class="codigoColor">
      <h4 class="codigoTitulo">Código Del Color</h4>
      <p class="codigoEtiqueta">Hexadecimal: <span id="codigoHexadecimal" class="codigo-color"></span></p>
      <p class="codigoEtiqueta">RGB: <span id="codigoRGB" class="codigo-color"></span></p>
    </div>
    
    <footer class="pieweb">
      <p class="pieParrafo">&copy;2020 - 2021 Eduardo Alveo. Derechos Reservados</p>
    </footer>
    
    <script src="js/programa.js"></script>
  </body>
</html>
