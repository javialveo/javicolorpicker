<!DOCTYPE html>
<!-- Archivo: index.html
  ** Autor: Eduardo Alveo

<html lang="es">
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/estilos.css">
    <meta name="description" content="JaviColorPicker, un sencillo selector de color para la web">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JaviColorPicker</title>
  </head>
  <body>
    <header class="cabecera">
      <h1 class="cabeceraTitulo">JaviColorPicker</h1>
      <p class="cabeceraParrafo">versión: <span id="cabeceraVersion"></span></p>
    </header>
    
    <main class="contenido">
      <div class="contenidoContenedor">
        <div class="contenidoSubContenedor">
          <div class="columna">
            <div id="columnaColorDiv" class="columnaColor"></div>
          </div>
          
          <div class="columna">
            <div class="seccion">
              <h4 class="seccionTitulo">Seleccione El Color</h4>
              <form class="seccionFormulario">
                <fieldset class="campo campo-conMargen">
                  <legend class="campoLeyenda">Selector de Color HTML5</legend>
                  
                  <input id="campoInputColor" class="campoInput campoInput-color" type="color">
                </fieldset>
                
                <fieldset class="campo">
                  <legend class="campoLeyenda">Rango <abbr title="RED, GREEN, BLUE">RGB</abbr></legend>
                  
                  <label class="campoEtiqueta" for="campoInputRojo">Rojo:<span id="campoEtiquetaRojo" class="campoValor">255</span></label>
                  <input id="campoInputRojo" class="campoInput" type="range">
                  
                  <br>
                  <label class="campoEtiqueta" for="campoInputVerde">Verde:<span id="campoEtiquetaVerde" class="campoValor">255</span></label>
                  <input id="campoInputVerde" class="campoInput" type="range">
                  
                  <br>
                  <label class="campoEtiqueta" for="campoInputAzul">Azul:<span id="campoEtiquetaAzul" class="campoValor">255</span></label>
                  <input id="campoInputAzul" class="campoInput" type="range">
                </fieldset>
              </form>
            </div>
            
            <div></div>
            
            <div class="seccion">
              <h4 class="seccionTitulo"> Código Del Color</h4>
              <p class="parrafo">
                <span class="parrafoEtiqueta">Hexadecimal:</span> <span id="parrafoHexadecimal"></span>
                <br>
                <span class="parrafoEtiqueta">RGB:</span> <span id="parrafoRGB"></span>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
    
    <footer class="pie">
      <p class="pieParrafo">&copy;2020 - 2021 Eduardo Alveo. Derechos Reservados</p>
    </footer>
    
    <script src="js/programa.js"></script>
  </body>
</html>
